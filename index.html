<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartTrack - Inicio</title>

<style>
:root { 
    --primary: #003366; 
    --accent: #27ae60; 
    --text: #333; 
    --bg: #f4f7f9;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: var(--bg);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.container {
    background: white;
    padding: 40px 30px;
    border-radius: 10px;
    box-shadow: 0 2px 15px rgba(0,0,0,0.1);
    text-align: center;
    max-width: 400px;
}

h1 {
    color: var(--primary);
    margin-bottom: 20px;
}

p {
    color: var(--text);
    margin-bottom: 25px;
    font-size: 0.95em;
}

button {
    padding: 12px 25px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
    font-size: 1em;
}

button:hover {
    background: #1e8449;
}
</style>
</head>

<body>

<div class="container">
    <h1>🚀 SmartTrack</h1>
    <p>Bienvenido al sistema de control de tránsito e infraestructura. Ingresa para continuar.</p>
    <button onclick="irLogin()">Ingresar</button>
</div>

<script>
function irLogin() {
    window.location.href = "login.html";
}
</script>

</body>
</html>
