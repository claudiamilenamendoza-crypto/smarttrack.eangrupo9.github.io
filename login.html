<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartTrack - Login</title>

<style>
:root { 
    --primary: #003366; 
    --accent: #27ae60; 
    --text: #333; 
    --bg: #f4f7f9;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: var(--bg);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.login-box {
    background: white;
    padding: 30px 25px;
    border-radius: 10px;
    width: 320px;
    box-shadow: 0 2px 15px rgba(0,0,0,0.1);
}

.login-box h2 {
    margin: 0 0 20px 0;
    color: var(--primary);
    text-align: center;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-bottom: 12px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 0.95em;
    box-sizing: border-box;
}

button {
    width: 100%;
    padding: 10px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #1e8449;
}

.error {
    color: red;
    font-size: 0.85em;
    text-align: center;
    margin-top: 10px;
}
</style>
</head>
<body>

<div class="login-box">
    <h2>🚀 SmartTrack</h2>

    <input type="text" id="usuario" placeholder="Usuario">
    <input type="password" id="clave" placeholder="Contraseña">

    <select id="rol">
        <option value="">Seleccionar rol</option>
        <option value="cliente">Cliente</option>
        <option value="conductor">Conductor</option>
    </select>

    <button onclick="login()">Ingresar</button>
    <p id="error" class="error"></p>
</div>

<script>
function login() {
    const user = document.getElementById("usuario").value;
    const pass = document.getElementById("clave").value;
    const rol = document.getElementById("rol").value;
    const error = document.getElementById("error");

    // Usuarios de prueba
    const usuarios = {
        cliente: { usuario: "cliente", clave: "1234" },
        conductor: { usuario: "conductor", clave: "1234" }
    };

    if (!rol) {
        error.innerText = "Selecciona un rol";
        return;
    }

    if (
        user === usuarios[rol].usuario &&
        pass === usuarios[rol].clave
    ) {
        if (rol === "cliente") {
            window.location.href = "cliente.html";
        } else {
            window.location.href = "index.html";
        }
    } else {
        error.innerText = "Usuario o contraseña incorrectos";
    }
}
</script>

</body>
</html>
